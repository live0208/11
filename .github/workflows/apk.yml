name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
      - run: npm install -g @bubblewrap/cli
      - run: |
          printf "y\n" | bubblewrap init --manifest "https://comforting-torte-2e148b.netlify.app/manifest.json" --directory twa
        working-directory: /tmp
      - run: bubblewrap build
        working-directory: /tmp/twa
      - uses: actions/upload-artifact@v4
        with:
          name: guangyu-apk
          path: /tmp/twa/app-release-signed.apk
