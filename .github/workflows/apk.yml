name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
          
      - run: npm install -g @bubblewrap/cli
      
      - name: Start local HTTP server for manifest
        run: |
          cd app
          python3 -m http.server 8080 &
          sleep 2
          
      - name: Bubblewrap init
        run: |
          printf "y\ny\n" | bubblewrap init --manifest "http://localhost:8080/manifest.json" --directory twa
        working-directory: /tmp
        
      - name: Bubblewrap build
        run: bubblewrap build
        working-directory: /tmp/twa
        
      - uses: actions/upload-artifact@v4
        with:
          name: guangyu-apk
          path: /tmp/twa/app-release-signed.apk
