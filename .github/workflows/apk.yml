name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
          
      - run: npm install -g @bubblewrap/cli
      
      - name: Start local HTTP server
        run: |
          cd app
          python3 -m http.server 8080 &
          sleep 2
          curl -s http://localhost:8080/manifest.json | head -3
          
      - name: Generate TWA project
        run: node gen_twa.js
        
      - name: Bubblewrap build
        run: bubblewrap build
        working-directory: output/twa-project
        
      - uses: actions/upload-artifact@v4
        with:
          name: guangyu-apk
          path: output/twa-project/app/build/outputs/apk/release/app-release-signed.apk
